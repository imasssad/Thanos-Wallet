appId: ai.thanos.wallet
productName: Thanos Wallet
copyright: Copyright © 2026 Thanos Wallet

# Skip @electron/rebuild — it doesn't understand pnpm's symlinked
# node_modules layout. The only native dep (keytar) ships prebuilt
# binaries that work with Electron 33 out of the box.
npmRebuild: false

# CRITICAL: installers must NOT land in dist/ — `files` below packages
# dist/**, so with the default output dir every build swallowed the
# PREVIOUS build's installers (0.2.14 = 465 MB → 0.2.15 = 700 MB → 0.2.17's
# archive outgrew 32-bit NSIS's mmap and the build aborted). release/ is
# gitignored already.
directories:
  output: release

# Files included in the packaged app — dist/ holds the transpiled main process
# and the Vite-built renderer bundle.
files:
  - dist/**
  - index.html

# Single application icon used by every target unless overridden per-OS.
# build/icons/icon.png at 1024×1024 produces all needed sizes at build time.
icon: build/icons/icon.png

# ─── macOS ───────────────────────────────────────────────────────────────────
# Hardened runtime + notarization are required for distribution outside the
# App Store. Notarization is gated on APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
# APPLE_TEAM_ID being present in the CI environment (see SIGNING.md).
mac:
  category: public.app-category.finance
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # electron-builder auto-discovers the Developer ID cert from the keychain
  # (or from CSC_LINK / CSC_KEY_PASSWORD when running in CI).
  # Notarization disabled by default; CI sets it to true via env vars when
  # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID are configured.
  notarize: false
  target:
    - dmg
    - zip

# ─── Mac App Store (MAS) ──────────────────────────────────────────────────────
# Separate sandboxed target — built ONLY by the desktop-macos-appstore workflow
# (needs Mac App Distribution + Mac Installer Distribution certs + a MAS
# provisioning profile). App Sandbox is ON here (Store requirement), which is
# why hardware-wallet + auto-update are compiled out of the MAS build. The
# provisioning profile is supplied at build time from the MAS_PROVISION_PROFILE
# secret (written to build/thanos-mas.provisionprofile in CI).
# See docs/DESKTOP-MACOS-APP-STORE.md.
mas:
  category: public.app-category.finance
  hardenedRuntime: false
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  provisioningProfile: build/thanos-mas.provisionprofile
  target:
    - pkg

# ─── Windows ─────────────────────────────────────────────────────────────────
# Code signing uses the EV cert delivered out-of-band (HSM-resident). In CI we
# point CSC_LINK at the .pfx file and CSC_KEY_PASSWORD at its passphrase.
# Without those env vars, an unsigned NSIS installer is still produced for
# local testing.
win:
  target:
    - nsis
  publisherName: Thanos Wallet
  # When CSC_LINK / CSC_KEY_PASSWORD are present, electron-builder auto-signs
  # with signtool using SHA-256. For HSM / YubiKey EV certs we'll need a
  # custom signer hook (see SIGNING.md, Windows section).
  signingHashAlgorithms:
    - sha256
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  # installerIcon/uninstallerIcon intentionally omitted — electron-builder
  # derives them from `icon` (the blue brand square) so the installer matches
  # the app icon. A stale icon.ico here previously showed the old white logo.

# ─── Linux ───────────────────────────────────────────────────────────────────
linux:
  target:
    - AppImage
    - deb
  category: Finance
  maintainer: Thanos Wallet <devs@thanos.fi>

# ─── Auto-update channel ─────────────────────────────────────────────────────
# Updates ship as GitHub Releases on the imasssad/Thanos-Wallet repo. The
# main-process autoUpdater (electron-updater) polls /releases/latest at boot
# and on a 1h interval. Operators publishing a private channel can override
# via the GH_TOKEN + UPDATER_URL env vars (see ops/RELEASING.md).
#
# Switching to a self-hosted feed: replace `provider: github` with
# `provider: generic` + a `url: https://updates.thanos.fi/${os}/${arch}/`.
publish:
  provider: github
  owner: imasssad
  repo: Thanos-Wallet
  releaseType: release
