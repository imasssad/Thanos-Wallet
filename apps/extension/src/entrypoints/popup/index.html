<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=360, initial-scale=1" />
    <title>Thanos Wallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <!-- #root ships a DARK, inline-styled fallback so the popup is never a
         blank-white screen — it shows even if popup.css or the JS bundle fails
         to load. React clears #root and takes over on mount; if it never
         mounts, the crash guards in main.tsx swap this for a reload card. -->
    <div id="root">
      <div id="boot-fallback" style="display:flex;align-items:center;justify-content:center;width:360px;height:600px;background:#080809;color:#9a9aa5;font:13px -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;">
        Loading Thanos&hellip;
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
