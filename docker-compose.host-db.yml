# Use the HOST's Postgres + Redis (instead of containers).
# Apply WITH docker-compose.yml + docker-compose.prod.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.host-db.yml up -d --build api indexer worker web

services:
  # Disable bundled postgres/redis containers via profile filter
  postgres:
    profiles: ["disabled"]
  redis:
    profiles: ["disabled"]

  # api/indexer/worker connect to HOST Postgres + Redis via host.docker.internal.
  # !reset tag (Compose >= 2.20) clears the depends_on inherited from base compose.
  api:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    ${REDIS_URL}
    depends_on: !reset []

  indexer:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    ${REDIS_URL}
    depends_on: !reset []
    # Internal-only — worker reaches indexer via docker network at http://indexer:4010
    ports: !reset []

  worker:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    ${REDIS_URL}
    depends_on: !reset []

  web:
    depends_on: !reset []
