# Use the HOST's Postgres + Redis (instead of containers).
# Apply WITH docker-compose.yml + docker-compose.prod.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.host-db.yml up -d --build api indexer worker web

services:
  # Disable bundled postgres/redis containers via profile filter
  postgres:
    profiles: ["disabled"]
  redis:
    profiles: ["disabled"]

  # api/indexer/worker connect to HOST Postgres + Redis via host.docker.internal.
  # Override depends_on with empty MAP (not list) to clear the long-form deps
  # in base docker-compose.yml.
  api:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    ${REDIS_URL}
    depends_on: {}

  indexer:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    ${REDIS_URL}
    depends_on: {}

  worker:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    ${REDIS_URL}
    depends_on: {}

  web:
    depends_on: {}
