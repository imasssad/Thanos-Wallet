# Use the HOST's Postgres + Redis (instead of containers).
# Apply WITH docker-compose.yml + docker-compose.prod.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.host-db.yml up -d --build api indexer worker

services:
  # Disable the bundled postgres / redis — host's are used instead
  postgres:
    profiles: ["disabled"]
  redis:
    profiles: ["disabled"]

  api:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    ${REDIS_URL}
    depends_on: []

  indexer:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    ${REDIS_URL}
    depends_on: []

  worker:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    ${REDIS_URL}
    depends_on: []
