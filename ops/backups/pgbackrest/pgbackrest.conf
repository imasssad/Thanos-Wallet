# pgBackRest configuration for Thanos Wallet.
#
# Single stanza `thanos` covering the only cluster on the VPS. Repo lives
# on a host-mounted volume so it survives container rebuilds, with optional
# async S3 mirror via the cron in ops/backups/pgbackrest/backup.sh.
#
# Retention is set tighter than the plain pg_dump rotation — pgBackRest
# stores binary clusters, which are much larger than gzipped logical dumps.
# Full backup weekly, diff daily, 14d WAL: RPO ~1 min, ~3x dump-storage cost.

[global]
# Local-disk repo. Mounted from /var/backups/thanos-pgbackrest on the host.
repo1-path                = /var/lib/pgbackrest
repo1-retention-full      = 2
repo1-retention-diff      = 7
# WAL retention is implicit — pgBackRest expires WAL older than the
# oldest backup it can still restore against, plus the archive-timeout
# buffer. 14d is the practical RPO window for a Tuesday restore.
repo1-bundle              = y
repo1-block               = y

# Compress WAL + backups. zstd is fast + ~30% smaller than gzip.
compress-type             = zst
compress-level            = 3

# Parallel workers — single VPS, single cluster, two cores is plenty.
process-max               = 2

# Sane defaults — log enough to debug a restore at 03:00, not so much
# that the log fills the disk.
log-level-console         = info
log-level-file            = detail
log-path                  = /var/log/pgbackrest

# Don't archive-push in parallel — single-node cluster, async is
# overkill and complicates the failure mode.
archive-async             = n

# Refuse to clobber an existing stanza on stanza-create — manual op.
[global:archive-push]
compress-level            = 3

[thanos]
# Local socket inside the container. Postgres + pgBackRest co-located,
# no TCP needed.
pg1-path                  = /var/lib/postgresql/data
pg1-port                  = 5432
pg1-user                  = postgres
pg1-socket-path           = /var/run/postgresql
