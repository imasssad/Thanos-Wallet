# Observability stack — Prometheus + Grafana.
#
# Runs as a separate compose project so it can be started / stopped without
# touching the wallet app stack. Both services bind to localhost only;
# reverse-proxy through nginx if you need remote access.
#
# Bring up:
#   docker compose -f ops/observability/docker-compose.observability.yml up -d
# Tear down (keeps data):
#   docker compose -f ops/observability/docker-compose.observability.yml stop
# Tear down + wipe (Grafana dashboards lost):
#   docker compose -f ops/observability/docker-compose.observability.yml down -v

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: thanos-prometheus
    restart: unless-stopped
    depends_on: [alertmanager]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'    # /-/reload endpoint, so config changes don't need a container restart
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Routes firing alerts → Slack (#thanos-alerts) and PagerDuty for
  # critical-severity. Secrets live in env vars on the host; a small
  # sed step substitutes them into the templated config at startup so
  # nothing sensitive sits in git.
  #
  # Required env (set in the host `.env`):
  #   SLACK_WEBHOOK_URL          (Slack incoming webhook)
  #   PAGERDUTY_INTEGRATION_KEY  (PagerDuty Events v2 routing key)
  # Leave either blank and that channel just silently no-ops.
  alertmanager:
    image: prom/alertmanager:latest
    container_name: thanos-alertmanager
    restart: unless-stopped
    # prom/alertmanager has /bin/sh + sed; use them to render the
    # secrets into a writable temp config, then exec alertmanager.
    user: root
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed -e "s|__SLACK_WEBHOOK_URL__|${SLACK_WEBHOOK_URL:-}|g" \
            -e "s|__PAGERDUTY_INTEGRATION_KEY__|${PAGERDUTY_INTEGRATION_KEY:-}|g" \
            /etc/alertmanager/alertmanager.tpl.yml > /etc/alertmanager/alertmanager.yml
        exec /bin/alertmanager \
          --config.file=/etc/alertmanager/alertmanager.yml \
          --storage.path=/alertmanager \
          --web.external-url=http://localhost:9093
    environment:
      # If the operator hasn't set the real Slack / PagerDuty creds yet,
      # substitute a syntactically-valid placeholder so Alertmanager's
      # config schema is satisfied and the daemon starts cleanly. The
      # `.invalid` TLD is RFC-reserved and never resolves, and the
      # all-zero PD routing key is well-formed but unrouteable — both
      # behave as silent no-op receivers until you swap in real values.
      SLACK_WEBHOOK_URL:         ${SLACK_WEBHOOK_URL:-https://hooks.slack.invalid/no-webhook-configured}
      PAGERDUTY_INTEGRATION_KEY: ${PAGERDUTY_INTEGRATION_KEY:-00000000000000000000000000000000}
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.tpl.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"

  grafana:
    image: grafana/grafana:latest
    container_name: thanos-grafana
    restart: unless-stopped
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    ports:
      - "127.0.0.1:3001:3000"

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
