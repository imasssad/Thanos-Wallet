# Observability stack — Prometheus + Grafana.
#
# Runs as a separate compose project so it can be started / stopped without
# touching the wallet app stack. Both services bind to localhost only;
# reverse-proxy through nginx if you need remote access.
#
# Bring up:
#   docker compose -f ops/observability/docker-compose.observability.yml up -d
# Tear down (keeps data):
#   docker compose -f ops/observability/docker-compose.observability.yml stop
# Tear down + wipe (Grafana dashboards lost):
#   docker compose -f ops/observability/docker-compose.observability.yml down -v

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: thanos-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'    # /-/reload endpoint, so config changes don't need a container restart
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: thanos-grafana
    restart: unless-stopped
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    ports:
      - "127.0.0.1:3001:3000"

volumes:
  prometheus_data:
  grafana_data:
