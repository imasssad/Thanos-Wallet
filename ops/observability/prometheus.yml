# Prometheus scrape config for Thanos Wallet.
#
# Each service exposes /metrics on its Docker network port. From the
# observability compose project, host.docker.internal:<port> resolves
# to the wallet stack via the extra_hosts mapping in docker-compose.

global:
  scrape_interval:     15s
  scrape_timeout:      10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

# Forward firing alerts to Alertmanager. Resolves to the alertmanager
# service in docker-compose.observability.yml.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Scrape Alertmanager itself so the dashboards can show silenced /
  # active counts and so we'd notice if it stopped responding.
  - job_name: alertmanager
    metrics_path: /metrics
    static_configs:
      - targets: ['alertmanager:9093']

  # ─── Wallet services ──────────────────────────────────────────────────
  # Scraped over the shared `thanos-net` docker network — see the
  # observability compose file. Service DNS resolves api / indexer /
  # worker to the running containers; this works regardless of host
  # port bindings (some services don't publish to the host at all).
  - job_name: thanos-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:4000']

  - job_name: thanos-indexer
    metrics_path: /metrics
    static_configs:
      - targets: ['indexer:4010']

  - job_name: thanos-worker
    metrics_path: /metrics
    static_configs:
      - targets: ['worker:4020']

  # ─── Host metrics (optional) ───────────────────────────────────────────
  # Run node_exporter on the host to scrape CPU/mem/disk/network. Reaches
  # the host via the docker bridge gateway (extra_hosts: host-gateway).
  #
  # - job_name: node
  #   static_configs:
  #     - targets: ['host.docker.internal:9100']
