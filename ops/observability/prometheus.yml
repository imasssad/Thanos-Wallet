# Prometheus scrape config for Thanos Wallet.
#
# Each service exposes /metrics on its Docker network port. From the
# observability compose project, host.docker.internal:<port> resolves
# to the wallet stack via the extra_hosts mapping in docker-compose.

global:
  scrape_interval:     15s
  scrape_timeout:      10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ─── Wallet services ──────────────────────────────────────────────────
  - job_name: thanos-api
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:4000']

  - job_name: thanos-indexer
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:4010']

  - job_name: thanos-worker
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:4020']

  # ─── Host metrics (optional) ───────────────────────────────────────────
  # Run node_exporter on the host to scrape CPU/mem/disk/network:
  #
  # - job_name: node
  #   static_configs:
  #     - targets: ['host.docker.internal:9100']
