# Minimal Alertmanager config used when no real Slack / PagerDuty creds
# are configured. Alerts still fire (visible in the Alertmanager UI + the
# Prometheus alerts page) but they silently drop into the null receiver
# instead of attempting to push to placeholder endpoints.
#
# The entrypoint in docker-compose.observability.yml picks this vs. the
# full alertmanager.yml template based on whether the env vars contain
# placeholder values (.invalid TLD or all-zero PD key).
#
# To get real Slack / PagerDuty notifications:
#   1. Set SLACK_WEBHOOK_URL + PAGERDUTY_INTEGRATION_KEY in /var/www/thanos-wallet/.env
#   2. docker compose -f ops/observability/docker-compose.observability.yml up -d --force-recreate alertmanager
# The entrypoint will then render the full routing tree from alertmanager.yml.
global:
  resolve_timeout: 5m

route:
  group_by:        ['alertname']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  receiver:        'null-receiver'

receivers:
  - name: 'null-receiver'
