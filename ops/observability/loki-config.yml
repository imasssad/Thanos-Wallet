# Minimal single-binary Loki config. Sized for the single-VPS deployment
# — local filesystem storage, 7-day retention, no clustering. When the
# stack grows past one host, swap storage_config to S3 and the schema
# version bump kicks in cleanly.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  # We bind to 127.0.0.1 in compose, so don't double-restrict here.

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# 7-day retention. Logs older than this get garbage-collected by the
# compactor. Raise per regulatory needs (KYC trails want ≥365d).
limits_config:
  retention_period: 168h          # 7d × 24h
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_series: 5000
  max_streams_per_user: 10000
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Disable Loki's own analytics phone-home.
analytics:
  reporting_enabled: false

ruler:
  alertmanager_url: http://alertmanager:9093
