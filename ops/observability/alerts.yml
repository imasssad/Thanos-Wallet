# Prometheus alert rules for Thanos Wallet.
#
# Loaded by prometheus.yml's `rule_files`. Alertmanager / Grafana
# routes these to Slack / PagerDuty / email — set up the destination
# in Grafana's contact-points UI.
#
# Thresholds are sized for a single-VPS deployment with the wallet
# stack + observability stack co-resident; tighten or relax as load
# changes.

groups:
  - name: thanos-availability
    interval: 30s
    rules:
      - alert: ThanosServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Prometheus has been unable to scrape {{ $labels.job }} for >2 minutes. Check `docker ps` and the service logs."

      - alert: ThanosApi5xxRateHigh
        expr: |
          (
            sum by (job) (
              rate(http_requests_total{job="thanos-api", status_code=~"5.."}[5m])
            )
          /
            sum by (job) (
              rate(http_requests_total{job="thanos-api"}[5m])
            )
          ) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx rate above 1% (5 min)"
          description: "API is returning 5xx on more than 1% of requests sustained over 5 minutes. Likely a DB or RPC failure — check the Sentry feed and `/health`."

      - alert: ThanosApiLatencyHigh
        expr: |
          histogram_quantile(
            0.99,
            sum by (job, le) (rate(http_request_duration_seconds_bucket{job="thanos-api"}[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API p99 latency above 1s"
          description: "p99 request latency on the API has been above 1 second for 10 minutes. Check downstream (Postgres, Redis) load."

  - name: thanos-worker
    interval: 30s
    rules:
      - alert: ThanosWorkerQueueBacklog
        expr: |
          max by (queue) (
            thanos_worker_queue_depth{state="wait"}
          ) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Worker queue {{ $labels.queue }} backlog > 100"
          description: "BullMQ wait depth for {{ $labels.queue }} has exceeded 100 for 5 minutes — workers are falling behind."

      - alert: ThanosWorkerFailedJobs
        expr: |
          increase(thanos_worker_jobs_total{status="failed"}[15m]) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Worker {{ $labels.queue }} failing > 10 jobs / 15 min"
          description: "Sustained job-failure rate on {{ $labels.queue }} — inspect Sentry breadcrumbs + the job_audit table."

  - name: thanos-bridge
    interval: 30s
    rules:
      # Bridge polling against bridge.litho.ai — sustained job failures
      # almost always mean MultX is down or returning 5xx. Wakes oncall
      # because in-flight bridges accumulate while the worker can't
      # progress them.
      - alert: ThanosBridgePollFailing
        expr: |
          increase(thanos_worker_jobs_total{queue="bridge-poll", status="failed"}[10m]) > 5
        for: 0m
        labels:
          severity: critical
          component: bridge
        annotations:
          summary: "MultX bridge polling failing (> 5 fails / 10 min)"
          description: "More than 5 bridge-poll jobs failed in 10 min — likely bridge.litho.ai is down or rate-limiting. Check `curl https://bridge.litho.ai/health` and the worker logs."

      # Sustained backlog on the bridge queue specifically — even if jobs
      # aren't outright failing, depth growing means we're falling behind.
      - alert: ThanosBridgeQueueBacklog
        expr: thanos_worker_queue_depth{queue="bridge-poll", state="wait"} > 50
        for: 10m
        labels:
          severity: warning
          component: bridge
        annotations:
          summary: "Bridge-poll backlog > 50 jobs"
          description: "BullMQ bridge-poll wait depth has been above 50 for 10 min — either MultX is slow or worker concurrency is too low."

  - name: thanos-indexer
    interval: 30s
    rules:
      - alert: ThanosIndexerSyncGap
        expr: thanos_indexer_sync_lag_blocks > 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Indexer is {{ $value }} blocks behind chain head"
          description: "Sync cursor has fallen >200 blocks behind head for 5 minutes. Check rpc.litho.ai availability and the indexer logs."

      - alert: ThanosIndexerStalled
        expr: |
          delta(thanos_indexer_cursor_block[10m]) == 0
          and thanos_indexer_sync_lag_blocks > 50
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Indexer cursor has not advanced in 10 min"
          description: "Sync loop is stuck — either RPC outage or worker crash. Check `docker logs thanos-indexer`."

  - name: thanos-rpc
    interval: 30s
    rules:
      # Dedicated RPC-outage detector. Watches the indexer's head-block
      # metric which is sampled from rpc.litho.ai / rpc-2.litho.ai via
      # the FallbackProvider. If the head doesn't advance for 3 min,
      # BOTH providers are down — that's a Lithosphere-network-wide
      # event, not a wallet bug, and the on-call should know early
      # rather than only via the indexer-stalled symptom.
      - alert: ThanosRpcOutage
        expr: |
          delta(thanos_indexer_head_block[3m]) == 0
          and on() thanos_indexer_head_block > 0
        for: 1m
        labels:
          severity: critical
          component: rpc
        annotations:
          summary: "Lithosphere RPC head not advancing (both rpc.litho.ai + rpc-2 unreachable)"
          description: "thanos_indexer_head_block has been flat for 3 min — the FallbackProvider can't reach either RPC. Check https://status.litho.ai and `curl -sv https://rpc.litho.ai` from the VPS."

  - name: thanos-auth
    interval: 30s
    rules:
      # Brute-force / credential-stuffing detector.
      # The rate-limiter already blocks at 10 attempts per 15 min per IP,
      # so seeing > 30 failed_login events per minute across the fleet
      # means a distributed attack is hitting many IPs.
      - alert: ThanosAuthFailedLoginSpike
        expr: |
          sum(rate(thanos_api_auth_events_total{event_type="failed_login"}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          component: auth
        annotations:
          summary: "Elevated failed-login rate ({{ $value | printf \"%.2f\" }}/s for 5 min)"
          description: "Sustained failed_login rate above 0.5/s (~30 attempts/min). Check auth_events table for source IPs + consider per-IP fail2ban."

      # Successful-login spike — possible credential stuffing if real
      # accounts are being compromised at a rate well above organic
      # signup growth. Tune the threshold once we have a baseline.
      - alert: ThanosAuthLoginAnomaly
        expr: |
          sum(rate(thanos_api_auth_events_total{event_type="login"}[5m])) > 2
        for: 10m
        labels:
          severity: warning
          component: auth
        annotations:
          summary: "Unusually high successful-login rate"
          description: "Successful logins above 2/s sustained for 10 min — investigate for credential stuffing if signup rate hasn't matched."
