# =============================================================================
# THANOS WALLET — STAGING NGINX VHOST
# =============================================================================
# Routes:
#   staging.thanos.fi           → web app (Next.js staging container on :3100)
#   staging.thanos.fi/api/*     → backend API (staging on :4200)
#   staging.thanos.fi/indexer/* → indexer (staging on :4210)
#
# Install on the server:
#   sudo cp nginx-staging.conf /etc/nginx/sites-available/thanos-wallet-staging
#   sudo ln -sf /etc/nginx/sites-available/thanos-wallet-staging /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cert:
#   sudo certbot --nginx -d staging.thanos.fi --non-interactive --agree-tos -m devs@thanos.fi
# =============================================================================

# HTTP — ACME challenge + redirect
server {
    listen 80;
    listen [::]:80;
    server_name staging.thanos.fi;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://staging.thanos.fi$request_uri;
    }
}

# HTTPS — serves the staging wallet stack. Upstream ports match the
# host-side bindings in docker-compose.staging.yml (4200 / 4210 / 3100).
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.thanos.fi;

    ssl_certificate     /etc/letsencrypt/live/staging.thanos.fi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.thanos.fi/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/staging.thanos.fi/chain.pem;

    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout           5s;

    # Same security headers as prod so staging tests catch CSP / HSTS regressions.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;

    # Plus a "non-prod" indicator header so QA tooling can assert it's
    # actually hitting staging.
    add_header X-Thanos-Env "staging" always;

    # API
    location /api/ {
        proxy_pass         http://127.0.0.1:4200/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Indexer
    location /indexer/ {
        proxy_pass         http://127.0.0.1:4210/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Web (Next.js)
    location / {
        proxy_pass         http://127.0.0.1:3100/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
