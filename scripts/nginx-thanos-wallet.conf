# =============================================================================
# THANOS WALLET — NGINX REVERSE PROXY
# =============================================================================
# Routes:
#   yourdomain.com           → web app (Next.js on :3000)
#   yourdomain.com/api/*     → backend API (Fastify on :4000)
#   yourdomain.com/indexer/* → indexer service (on :4010)
#
# Install on the server:
#   sudo cp nginx-thanos-wallet.conf /etc/nginx/sites-available/thanos-wallet
#   sudo ln -sf /etc/nginx/sites-available/thanos-wallet /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add SSL with Let's Encrypt:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com
# =============================================================================

server {
    listen 80;
    listen [::]:80;

    # CHANGE THIS to your domain (or keep IP for now)
    server_name 76.13.250.159 _;

    client_max_body_size 10M;

    # Gzip — faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # ─── API (Fastify) ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4100/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ─── Indexer (LEP-100 sync service) ─────────────────────────────────
    location /indexer/ {
        proxy_pass         http://127.0.0.1:4010/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Next.js web app (everything else) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        # Next.js HMR / streaming
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
