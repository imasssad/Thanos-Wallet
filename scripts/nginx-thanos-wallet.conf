# =============================================================================
# THANOS WALLET — NGINX REVERSE PROXY  (HTTP + HTTPS)
# =============================================================================
# Routes:
#   devapp.thanos.fi           → web app (Next.js on :3000)
#   devapp.thanos.fi/api/*     → backend API (on :4100)
#   devapp.thanos.fi/indexer/* → indexer service (on :4010)
#
# Install on the server:
#   sudo cp nginx-thanos-wallet.conf /etc/nginx/sites-available/thanos-wallet
#   sudo ln -sf /etc/nginx/sites-available/thanos-wallet /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# To get / renew certs, see scripts/HTTPS_RUNBOOK.md
# =============================================================================

# ─── HTTP server: certbot ACME challenge + redirect everything else to HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name devapp.thanos.fi 76.13.250.159 _;

    # Let certbot's webroot challenge work without the redirect interfering
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS (only after the cert is issued; before that,
    # comment out this block and use the plain-HTTP server below.)
    location / {
        return 301 https://devapp.thanos.fi$request_uri;
    }
}

# ─── HTTPS server (active after certbot has issued the cert) ─────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name devapp.thanos.fi;

    ssl_certificate     /etc/letsencrypt/live/devapp.thanos.fi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devapp.thanos.fi/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/devapp.thanos.fi/chain.pem;

    # Sane TLS defaults (Mozilla intermediate, 2024)
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout           5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 10M;

    # Gzip — compress text/JSON in transit (T1). gzip_vary adds
    # `Vary: Accept-Encoding` so a cache never hands a gzipped body to a client
    # that didn't negotiate it; gzip_proxied any keeps it working behind a
    # future CDN. Already-compressed payloads (images, the .apk, wasm) are NOT
    # in gzip_types, so they're never double-compressed. brotli is intentionally
    # omitted — it needs the ngx_brotli module compiled in and would fail
    # `nginx -t` on a stock build.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css text/xml application/json application/javascript application/manifest+json application/xml application/xml+rss application/atom+xml image/svg+xml;

    # ─── API (Fastify) ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4100/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ─── Indexer (LEP-100 sync service) ─────────────────────────────────
    location /indexer/ {
        proxy_pass         http://127.0.0.1:4010/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # T3 — bound how long we wait on the indexer so a hung upstream can't pin
        # a client (and nginx) connection open. The indexer's own queries are
        # fast; 30s is generous headroom.
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # ─── Next.js web app (everything else) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
