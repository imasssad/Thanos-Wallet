# =============================================================================
# THANOS WALLET — NGINX REVERSE PROXY
# =============================================================================
# Serves thanos.fi (primary) and devapp.thanos.fi (alternate). Routes:
#   /            → web app (Next.js on :3000)
#   /api/*       → backend API (on :4100)
#   /indexer/*   → indexer service (on :4010)
#
# Cloudflare fronts thanos.fi and can terminate TLS — so this config has both
# an HTTP server (for Cloudflare → origin in Flexible/Full mode, also for
# certbot ACME challenges) and an HTTPS server (used when origin TLS is on,
# e.g. direct access to devapp.thanos.fi or Cloudflare Full/Strict with an
# origin cert). The HTTPS block is safe to comment out if no cert is issued
# at /etc/letsencrypt/live/thanos.fi/.
#
# Install on the server:
#   sudo cp nginx-thanos-wallet.conf /etc/nginx/sites-available/thanos-wallet
#   sudo ln -sf /etc/nginx/sites-available/thanos-wallet /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# To get / renew Let's Encrypt certs, see scripts/HTTPS_RUNBOOK.md
# =============================================================================

# ─── HTTP server (port 80) ────────────────────────────────────────────────────
# Behind Cloudflare (Flexible/Full), this is what serves all traffic — TLS is
# terminated at Cloudflare's edge and the origin gets plain HTTP. Also serves
# the certbot webroot challenge if you ever issue an origin cert.
server {
    listen 80;
    listen [::]:80;
    server_name thanos.fi www.thanos.fi devapp.thanos.fi _;

    # certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 10M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # ─── API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4100/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ─── Indexer (LEP-100 sync + portfolio) ─────────────────────────────
    location /indexer/ {
        proxy_pass         http://127.0.0.1:4010/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── Next.js web app (everything else) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_buffering    off;
        proxy_read_timeout 60s;
    }
}

# ─── HTTPS server (port 443) ──────────────────────────────────────────────────
# Optional — only used when origin TLS is on. Requires a Let's Encrypt cert at
# /etc/letsencrypt/live/thanos.fi/. Comment this block out if no cert is
# issued yet (Cloudflare-fronted setups don't need it).
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thanos.fi www.thanos.fi devapp.thanos.fi;

    ssl_certificate     /etc/letsencrypt/live/thanos.fi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thanos.fi/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/thanos.fi/chain.pem;

    # Sane TLS defaults (Mozilla intermediate, 2024)
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout           5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass         http://127.0.0.1:4100/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    location /indexer/ {
        proxy_pass         http://127.0.0.1:4010/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_buffering    off;
        proxy_read_timeout 60s;
    }
}
