# =============================================================================
# THANOS WALLET — NGINX REVERSE PROXY  (origin behind Cloudflare)
# =============================================================================
# Serves thanos.fi (primary) and devapp.thanos.fi (alternate) on the same VPS.
#
# Cloudflare terminates TLS at the edge — the origin only needs HTTP. The
# HTTPS server block was removed because it required a Let's Encrypt cert at
# /etc/letsencrypt/live/thanos.fi/ that doesn't exist; with Cloudflare in
# front, the origin certificate isn't needed.
#
# Routes:
#   /            → web app (Next.js on :3000)
#   /api/*       → backend API (on :4100)
#   /indexer/*   → indexer service (on :4010)
#
# Install on the server:
#   sudo cp /var/www/thanos-wallet/scripts/nginx-thanos-wallet.conf \
#           /etc/nginx/sites-available/thanos-wallet
#   sudo ln -sf /etc/nginx/sites-available/thanos-wallet \
#               /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# If you ever want direct origin TLS (Cloudflare Full/Strict with an origin
# certificate, or no Cloudflare at all), see scripts/HTTPS_RUNBOOK.md to
# issue a Let's Encrypt cert for thanos.fi, then add an HTTPS server block
# matching the HTTP one below with the cert paths under
# /etc/letsencrypt/live/thanos.fi/.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name thanos.fi www.thanos.fi devapp.thanos.fi _;

    # certbot ACME challenge — kept here in case origin TLS is ever turned on
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # ─── API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4100/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ─── Indexer (LEP-100 sync + portfolio) ─────────────────────────────
    location /indexer/ {
        proxy_pass         http://127.0.0.1:4010/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── Next.js web app (everything else) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_buffering    off;
        proxy_read_timeout 60s;
    }
}
