# Production override — apply alongside docker-compose.yml
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  # postgres + redis intentionally have no override here — they run as
  # Docker-network-only containers (no host port), defined fully in the
  # base docker-compose.yml.

  api:
    environment:
      NODE_ENV: production
    # Remove dev volume mount — use built image only
    volumes: []
    # Expose only on localhost; use nginx reverse proxy in front for SSL
    # Port 4100 instead of 4000 to avoid conflict with stuck proxies
    ports:
      - "127.0.0.1:4100:4000"

  indexer:
    environment:
      NODE_ENV: production
    # Published on localhost only — nginx proxies /indexer/ to it, and
    # the web app calls /indexer for portfolio / token data.
    ports:
      - "127.0.0.1:4010:4010"

  worker:
    environment:
      NODE_ENV: production

  # ─── Web app (Next.js wallet UI) ───────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # NEXT_PUBLIC_* vars are read by Next.js during `next build` and
      # inlined into the client bundle — they MUST be passed as build
      # args, not just runtime env, or the browser sees `undefined`.
      # That's how the Permissions screen got its "NEXT_PUBLIC_REOWN_
      # PROJECT_ID is not set" banner: the value was in .env but the
      # build never saw it. Source-of-truth values live in the VPS .env
      # file alongside this compose; pnpm-version'd defaults below keep
      # local docker compose up working when the var isn't set.
      args:
        NEXT_PUBLIC_API_URL:          ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_REOWN_PROJECT_ID: ${NEXT_PUBLIC_REOWN_PROJECT_ID:-}
        NEXT_PUBLIC_INDEXER_URL:      ${NEXT_PUBLIC_INDEXER_URL:-/indexer}
        NEXT_PUBLIC_MULTX_API_URL:    ${NEXT_PUBLIC_MULTX_API_URL:-https://bridge.litho.ai}
    container_name: thanos-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Public URL the client uses to call the API. Set in .env to your domain.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    # Localhost-only — nginx will reverse proxy to it
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      # Slim Next.js image doesn't have wget — use node's http module instead
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
