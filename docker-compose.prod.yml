# Production override — apply alongside docker-compose.yml
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  postgres:
    # Bind only to localhost — never expose Postgres to the internet.
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    # Same: localhost only.
    ports:
      - "127.0.0.1:6379:6379"

  api:
    environment:
      NODE_ENV: production
    # Remove dev volume mount — use built image only
    volumes: []
    # Expose only on localhost; use nginx reverse proxy in front for SSL
    ports:
      - "127.0.0.1:4000:4000"

  indexer:
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:4010:4010"

  worker:
    environment:
      NODE_ENV: production

  # ─── Web app (Next.js wallet UI) ───────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: thanos-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Public URL the client uses to call the API. Set in .env to your domain.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    # Localhost-only — nginx will reverse proxy to it
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      # Slim Next.js image doesn't have wget — use node's http module instead
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
