name: ci

# Fast feedback on every push + PR: typecheck and a minimal build sanity
# check across the four clients + backend services. Heavy stuff (release
# bundles, electron dist, mobile EAS) stays in release.yml on tags.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight CI when a newer commit lands on the same ref. Rapid pushes
# (a fixup series) shouldn't each run the full 10-job matrix to completion — only
# the newest commit matters, and the superseded runs were burning through the
# private-repo Actions minute budget that this whole failure traces back to.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck (all workspaces)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20 }
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      - name: Typecheck workspace
        run: pnpm typecheck
        env:
          # Web app needs these at typecheck time to satisfy NEXT_PUBLIC_* reads.
          NEXT_PUBLIC_LITHO_RPC:        https://rpc.litho.ai
          NEXT_PUBLIC_REOWN_PROJECT_ID: 6d05d9a84112ca2f7c1bb77a76a18c81
          NEXT_PUBLIC_MULTX_API_URL:    https://bridge.litho.ai

  lint:
    name: lint (eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Lint runs in parallel with typecheck. Failing on warnings would
    # break CI on every signal-noise change, so we set a budget via
    # `--max-warnings 500` (see root package.json). The budget should
    # ratchet down as the codebase converges, not up.
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20 }
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm lint

  build-web:
    name: build (web)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20 }
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @thanos/web build
        env:
          NEXT_PUBLIC_LITHO_RPC:        https://rpc.litho.ai
          NEXT_PUBLIC_REOWN_PROJECT_ID: 6d05d9a84112ca2f7c1bb77a76a18c81
          NEXT_PUBLIC_MULTX_API_URL:    https://bridge.litho.ai

  build-extension:
    name: build (extension)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20 }
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @thanos/extension build
      # Bundle-size budget — catches dep bloat in PRs before it ships.
      # Trips when a single PR adds >25% to a popup/offscreen chunk.
      - name: Bundle-size budget check
        run: bash ops/bundle-size-check.sh

  test:
    name: tests (vault + auth)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20 }
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      # SDK-core: BIP-39/44 derivation + bech32 round-trip + price-history math
      # + ecosystem helpers + phishing classifier. A regression here breaks
      # every client, so it runs first.
      - run: pnpm --filter @thanos/sdk-core test
      # Vault round-trip tests — encrypt/decrypt, wrong password, tampering.
      # A regression here locks every user out of their funds, so this gate
      # blocks the entire PR.
      - run: pnpm --filter @thanos/web test
      # Auth route tests — register/login/me/refresh/logout against a mocked pg.
      - run: pnpm --filter @thanos/api test

  integration-pg:
    name: integration (api ↔ real Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Postgres service container — pinned to the same major version we
    # ship in docker-compose.yml so schema.sql runs against an identical
    # dialect. Health-check makes setup-node + pnpm install run only
    # after pg accepts connections.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     thanos
          POSTGRES_PASSWORD: thanos
          POSTGRES_DB:       thanos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thanos -d thanos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      # REDIS_URL below was previously dead config — the job exported it
      # with no redis container listening, so any test path touching Redis
      # failed or silently fell back. Same major as docker-compose.yml.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20 }
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      - name: Run schema + contacts integration tests (api)
        run: pnpm --filter @thanos/api test -- integration
        env:
          DATABASE_URL: postgres://thanos:thanos@127.0.0.1:5432/thanos_test
          JWT_SECRET:   test_jwt_secret_at_least_32_chars_long_x
          REDIS_URL:    redis://localhost:6379
          CORS_ORIGINS: http://localhost:3000
      - name: Run LEP100 indexer integration tests
        run: pnpm --filter @thanos/indexer test
        env:
          DATABASE_URL:       postgres://thanos:thanos@127.0.0.1:5432/thanos_test
          # Indexer's chain.ts reads these at import time; defaults make
          # the import work without ever contacting the network. The tests
          # themselves never reach RPC — they call processTransferLog
          # directly with synthetic Log objects.
          LITHO_RPC_PRIMARY:  https://rpc.litho.ai
          LITHO_RPC_FALLBACK: https://rpc-2.litho.ai
          LITHO_CHAIN_ID:     '700777'

  audit:
    name: dependency audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Non-blocking for now — surfaces advisories but doesn't fail the build.
    # Flip to `continue-on-error: false` once the floor is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20 }
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      - name: pnpm audit (high+ severity, prod deps only)
        run: pnpm audit --audit-level=high --prod

  gitleaks:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The official gitleaks-action started requiring a paid GITLEAKS_LICENSE
    # for org repos as of late 2024 — every run errored with
    # "missing gitleaks license" even though we don't actually need their
    # billing layer. Drop the action and run the CLI directly: it's the
    # same scanner, MIT-licensed, no license check.
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }  # full history so the scan covers every commit on a PR
      - name: Install gitleaks CLI
        run: |
          GITLEAKS_VERSION=8.20.1
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks scan
        # `detect` scans the working tree + git history. --redact keeps
        # any matched secret out of the log output (we don't want CI logs
        # to surface a real leak; the report file is for the operator).
        # Exit code 1 = leaks found → fails the job. Exit 0 = clean.
        run: gitleaks detect --redact --verbose --report-format json --report-path gitleaks-report.json
      - name: Upload gitleaks report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 14

  link-probe-prod:
    name: link-probe (production endpoints)
    # Only on push to main — a PR can't break production yet, and running
    # this on every PR would waste minutes + give noisy failures when
    # an external upstream (CoinGecko, etc.) hiccups during a CI run.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # External upstreams can flap. Don't fail the build on a single CI
    # run finding one CoinGecko 403; the 5-min VPS cron is the source
    # of truth for real outages (it'll alarm if the flap persists). CI
    # gives us the second monitoring layer + a paper trail per commit.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Probe thanos.fi production endpoints
        # --category prod isolates the check to /api/health, /privacy,
        # icons, etc. — the user-facing surface a commit could break.
        # Exits 1 when a CRITICAL group is fully down (homepage, /app,
        # /api/health). Exits 2 on non-critical red (an icon 404), in
        # which case continue-on-error keeps the build green.
        run: bash ops/link-probe.sh --category prod

  link-probe-external:
    name: link-probe (external upstreams)
    # Same gate — only on push to main, never PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Always continue-on-error — external upstreams (Lithosphere RPC,
    # mempool.space, CoinGecko CDN, etc.) are not our SLO. This job is
    # a visibility check, not a build gate. The cron on the VPS pages
    # the operator if a real outage persists.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Probe Lithosphere + external chain RPCs
        run: bash ops/link-probe.sh --category litho
      - name: Probe external chain RPCs (BTC / SOL / Cosmos / ETH / BSC)
        run: bash ops/link-probe.sh --category rpc
      - name: Probe CoinGecko CDN icons (still-referenced)
        run: bash ops/link-probe.sh --category cdn
