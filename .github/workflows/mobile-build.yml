# Android builds on GitHub-hosted runners via `eas build --local`.
#
# WHY: the Expo free plan's cloud-build quota is monthly and we exhausted it
# mid-release (July 2026, debugging the SDK 53 launch crash). --local runs the
# identical EAS build pipeline (prebuild → gradle, remote credentials pulled
# with EXPO_TOKEN, same signing keystore) on the runner instead of the EAS
# queue — no quota, no queue wait. Artifacts are uploaded to the run page.
#
# Trigger manually: gh workflow run mobile-build.yml [-f profile=production-apk]
name: mobile-build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        default: production
        type: choice
        options: [production, production-apk]

jobs:
  build:
    name: eas local build (${{ inputs.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm ci   # .npmrc carries legacy-peer-deps (vendored multx-sdk peers react ^18)

      - name: EAS local build
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          EXT=aab
          if [ "${{ inputs.profile }}" = "production-apk" ]; then EXT=apk; fi
          npx eas-cli build --platform android --profile "${{ inputs.profile }}" \
            --local --non-interactive --output "./thanos-${{ inputs.profile }}.${EXT}"

      - uses: actions/upload-artifact@v4
        with:
          name: thanos-${{ inputs.profile }}
          path: apps/mobile/thanos-${{ inputs.profile }}.*
          retention-days: 14
